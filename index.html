<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aviation Professionals Inc. — Coming Online</title>
<style>
  :root{--altitude:#071729;--horizon:#E89A3C;--horizon-bright:#F6B85C;--marking:#F4F1E9;--steel:#9DB4CC}
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(120% 100% at 50% 0%,#0B2742 0%,#071729 55%,#04101F 100%);
    color:var(--marking);font-family:system-ui,sans-serif;padding:24px}
  .mark{font-family:Georgia,serif;font-weight:900;font-size:clamp(3rem,12vw,6rem);letter-spacing:.05em}
  .mark span{color:var(--horizon)}
  .sub{font-family:ui-monospace,monospace;letter-spacing:.32em;text-transform:uppercase;
    font-size:.8rem;color:var(--steel);margin:18px 0 8px}
  h1{font-weight:700;font-size:clamp(1.2rem,3.5vw,1.8rem);margin-top:6px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--horizon-bright);
    margin-right:8px;animation:p 1.6s ease-in-out infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
</style></head>
<body><div>
  <div class="mark">A<span>P</span>I</div>
  <div class="sub">Aviation Professionals Inc. · Chicago Midway · Est. 1973</div>
  <h1><span class="dot"></span>Site coming online</h1>
</div></body></html>
